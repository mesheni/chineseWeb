<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Китайский язык - учимся</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Учим китайский</h1>
      <div class="stats">
        <span id="known-count">Изучено: 0</span>
        <span id="total-count">Всего: 0</span>
      </div>
    </header>

    <nav class="nav-tabs">
      <button class="nav-tab active" data-mode="study">📖 Изучение</button>
      <button class="nav-tab" data-mode="review">🔄 Повторение</button>
      <button class="nav-tab" data-mode="stats">📊 Статистика</button>
    </nav>

    <main>
      <div id="study-mode" class="mode active">
        <div id="study-filter" class="study-filter">
          <label>Уровень:</label>
          <select id="level-filter">
            <option value="all">Все уровни</option>
            <option value="HSK 1">HSK 1</option>
            <option value="HSK 2">HSK 2</option>
            <option value="HSK 3">HSK 3</option>
            <option value="HSK 4">HSK 4</option>
            <option value="HSK 5">HSK 5</option>
            <option value="HSK 6">HSK 6</option>
          </select>
        </div>
        <div class="flashcard" id="flashcard">
          <div class="card" id="card">
            <div class="card-front">
              <div class="character" id="character">?</div>
              <div class="pinyin" id="pinyin"></div>
              <button id="speak-btn" class="speak-btn">🔊</button>
            </div>
            <div class="card-back">
              <div class="translation" id="translation"></div>
              <div class="example" id="example"></div>
              <button id="speak-example-btn" class="speak-example-btn hidden">🔊</button>
            </div>
          </div>
        </div>

        <div class="controls" id="study-controls">
          <button id="show-answer">Показать ответ</button>
          <button id="know-btn" class="hidden">Знаю</button>
          <button id="dont-know-btn" class="hidden">Не знаю</button>
          <button id="next-btn" class="hidden">Следующее</button>
        </div>

        <div class="study-progress" id="study-progress">
          <span id="study-progress-text">Изучено: 0 / 0</span>
        </div>
      </div>

      <div id="review-mode" class="mode">
        <div class="review-header">
          <span id="review-count">На сегодня: 0 слов</span>
          <span id="review-position">Слово 0 из 0</span>
        </div>

        <div class="flashcard" id="review-flashcard">
          <div class="card" id="review-card">
            <div class="card-front">
              <div class="character" id="review-character">?</div>
              <div class="pinyin" id="review-pinyin"></div>
              <button id="review-speak-btn" class="speak-btn">🔊</button>
            </div>
            <div class="card-back">
              <div class="translation" id="review-translation"></div>
              <div class="example" id="review-example"></div>
              <button id="review-speak-example-btn" class="speak-example-btn hidden">🔊</button>
            </div>
          </div>
        </div>

        <div class="controls" id="review-controls">
          <button id="review-show-answer">Показать ответ</button>
          <button id="review-quality-1" class="review-quality hidden" data-quality="1">Забыл</button>
          <button id="review-quality-3" class="review-quality hidden" data-quality="3">Тяжело</button>
          <button id="review-quality-4" class="review-quality hidden" data-quality="4">Нормально</button>
          <button id="review-quality-5" class="review-quality hidden" data-quality="5">Легко</button>
          <button id="review-restart" class="hidden">Начать заново</button>
        </div>

        <div id="review-done" class="review-done hidden">
          <h2>Повторение завершено! 🎉</h2>
          <button id="review-restart-done">Начать заново</button>
        </div>
      </div>

      <div id="stats-mode" class="mode">
        <div class="stats-grid" id="stats-grid"></div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
